<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Memories 💖 Jeenamaa</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:  #FF2D6B;
      --blush: #FF8FAB;
      --deep:  #1A0510;
      --wine:  #6B0F3A;
      --gold:  #FFD700;
      --cream: #FFF0F5;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--deep);
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── Top nav ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      backdrop-filter: blur(20px);
      background: rgba(26,5,16,0.75);
      border-bottom: 1px solid rgba(255,143,171,0.12);
    }
    .topbar-title {
      font-family: 'Great Vibes', cursive;
      font-size: 28px;
      color: var(--blush);
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: rgba(255,240,245,0.6);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--blush); }

    /* ── Page header ── */
    .album-header {
      padding: 120px 24px 60px;
      text-align: center;
    }
    .album-header h1 {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(44px, 8vw, 80px);
      background: linear-gradient(135deg, var(--gold), var(--rose), var(--blush));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }
    .album-header p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-style: italic;
      color: rgba(255,240,245,0.5);
    }

    /* ── ADD PHOTO SECTION ── */
    .add-section {
      max-width: 700px;
      margin: 0 auto 60px;
      padding: 0 24px;
    }
    .add-card {
      background: rgba(255,255,255,0.04);
      border: 1px dashed rgba(255,143,171,0.35);
      border-radius: 24px;
      padding: 32px;
    }
    .add-card h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      color: var(--blush);
      margin-bottom: 20px;
    }
    .form-row {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 20px;
    }
    .form-row input[type="text"],
    .form-row input[type="date"],
    .form-row textarea {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,143,171,0.2);
      border-radius: 12px;
      padding: 12px 18px;
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .form-row input:focus,
    .form-row textarea:focus { border-color: rgba(255,45,107,0.5); }
    .form-row textarea { resize: vertical; min-height: 80px; }
    ::placeholder { color: rgba(255,240,245,0.3); }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed rgba(255,143,171,0.3);
      border-radius: 16px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      margin-bottom: 16px;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--rose);
      background: rgba(255,45,107,0.05);
    }
    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .drop-zone-icon { font-size: 36px; margin-bottom: 10px; }
    .drop-zone p { font-size: 14px; color: rgba(255,240,245,0.45); }
    .drop-zone span { color: var(--blush); font-weight: 500; }

    #preview-img {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: 12px;
      display: none;
      margin-bottom: 16px;
    }

    .btn-add {
      width: 100%;
      background: linear-gradient(135deg, var(--rose), var(--wine));
      color: white;
      border: none;
      border-radius: 100px;
      padding: 16px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-add:hover { opacity: 0.9; transform: translateY(-2px); }

    /* ── PHOTO ALBUM GRID ── */
    .album-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 120px;
    }
    .album-count {
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,240,245,0.3);
      margin-bottom: 32px;
      text-align: center;
    }

    /* Masonry-style scrollable photo stack with crossfade */
    .photos-scroll {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Each photo entry fades in and merges into the next */
    .photo-entry {
      position: relative;
      opacity: 0;
      transform: translateY(50px) scale(0.97);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }
    .photo-entry.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* Overlap / merge effect — negative margin so photos blend */
    .photo-entry + .photo-entry {
      margin-top: -60px;
    }

    .photo-frame {
      position: relative;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 -20px 60px rgba(26,5,16,0.8);
    }
    .photo-frame img {
      width: 100%;
      height: clamp(260px, 50vw, 520px);
      object-fit: cover;
      display: block;
      transition: transform 0.6s ease;
    }
    .photo-frame:hover img { transform: scale(1.03); }

    /* Gradient overlay at top — blends with card above */
    .photo-frame::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 100px;
      background: linear-gradient(to bottom, var(--deep), transparent);
      z-index: 2;
      pointer-events: none;
    }
    /* Gradient overlay at bottom — for caption legibility */
    .photo-frame::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 160px;
      background: linear-gradient(to top, rgba(26,5,16,0.92), transparent);
      z-index: 2;
      pointer-events: none;
    }

    .photo-caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 3;
      padding: 24px 28px;
    }
    .photo-caption h4 {
      font-family: 'Great Vibes', cursive;
      font-size: 28px;
      color: var(--cream);
      margin-bottom: 4px;
    }
    .photo-caption .caption-meta {
      font-size: 12px;
      color: rgba(255,240,245,0.5);
      letter-spacing: 0.1em;
    }
    .photo-caption .caption-note {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-style: italic;
      color: rgba(255,240,245,0.7);
      margin-top: 4px;
    }

    /* Delete button */
    .photo-delete {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 4;
      background: rgba(26,5,16,0.7);
      border: 1px solid rgba(255,45,107,0.3);
      border-radius: 50%;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 16px;
      color: rgba(255,240,245,0.6);
      transition: background 0.2s, color 0.2s;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .photo-entry:hover .photo-delete { opacity: 1; }
    .photo-delete:hover { background: rgba(255,45,107,0.3); color: var(--cream); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: rgba(255,240,245,0.3);
    }
    .empty-state .empty-icon { font-size: 56px; margin-bottom: 16px; }
    .empty-state p { font-size: 16px; line-height: 1.7; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--wine);
      border: 1px solid rgba(255,143,171,0.3);
      color: var(--cream);
      padding: 14px 28px;
      border-radius: 100px;
      font-size: 14px;
      z-index: 500;
      transition: transform 0.4s ease;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .topbar { padding: 14px 16px; }
      .photo-entry + .photo-entry { margin-top: -40px; }
    }
  </style>
</head>
<body>

<!-- Top nav -->
<nav class="topbar">
  <a href="index.html" class="back-btn">← Back to Birthday</a>
  <span class="topbar-title">Our Memories</span>
  <span style="font-size:20px">💖</span>
</nav>

<!-- Header -->
<div class="album-header">
  <h1>Our Photo Album</h1>
  <p>Every picture is a memory I hold close to my heart</p>
</div>

<!-- Add Photo Form -->
<div class="add-section">
  <div class="add-card">
    <h3>✨ Add a new memory</h3>
    <img id="preview-img" src="" alt="Preview">
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*">
      <div class="drop-zone-icon">📸</div>
      <p>Drag & drop a photo here or <span>click to browse</span></p>
    </div>
    <div class="form-row">
      <input type="text" id="input-title" placeholder="Memory title (e.g. Our first trip to Goa)">
      <input type="date" id="input-date">
      <textarea id="input-note" placeholder="A little note about this memory... (optional)"></textarea>
    </div>
    <button class="btn-add" onclick="addPhoto()">💖 Add to Album</button>
  </div>
</div>

<!-- Album -->
<div class="album-container">
  <p class="album-count" id="count-label">0 memories</p>
  <div class="photos-scroll" id="photos-list"></div>
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">🌸</div>
    <p>No photos yet.<br>Add your first memory above!</p>
  </div>
</div>

<div id="toast"></div>

<script>
  // ── Storage key ──
  const STORE_KEY = 'jeenamaa_album_v1';

  // ── State ──
  let photos = [];
  let selectedFile = null;

  // ── Load from localStorage ──
  function loadPhotos() {
    try {
      const saved = localStorage.getItem(STORE_KEY);
      if (saved) photos = JSON.parse(saved);
    } catch(e) { photos = []; }
    renderAll();
  }

  function savePhotos() {
    localStorage.setItem(STORE_KEY, JSON.stringify(photos));
  }

  // ── File input ──
  const fileInput  = document.getElementById('file-input');
  const dropZone   = document.getElementById('drop-zone');
  const previewImg = document.getElementById('preview-img');

  fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });

  function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = ev => {
      previewImg.src = ev.target.result;
      previewImg.style.display = 'block';
      dropZone.style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  // ── Add photo ──
  function addPhoto() {
    if (!selectedFile) { showToast('Please choose a photo first 📸'); return; }
    const title = document.getElementById('input-title').value.trim() || 'Our memory';
    const date  = document.getElementById('input-date').value;
    const note  = document.getElementById('input-note').value.trim();

    const reader = new FileReader();
    reader.onload = ev => {
      const photo = {
        id:    Date.now(),
        src:   ev.target.result,
        title, date, note,
      };
      photos.unshift(photo);
      savePhotos();
      renderAll();
      resetForm();
      showToast('Memory added! 💖');
      // Scroll to album
      document.getElementById('photos-list').scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    reader.readAsDataURL(selectedFile);
  }

  function resetForm() {
    selectedFile = null;
    previewImg.style.display = 'none';
    previewImg.src = '';
    dropZone.style.display = '';
    document.getElementById('file-input').value = '';
    document.getElementById('input-title').value = '';
    document.getElementById('input-date').value = '';
    document.getElementById('input-note').value = '';
  }

  // ── Delete photo ──
  function deletePhoto(id) {
    if (!confirm('Remove this memory?')) return;
    photos = photos.filter(p => p.id !== id);
    savePhotos();
    renderAll();
    showToast('Memory removed');
  }

  // ── Render ──
  function renderAll() {
    const list  = document.getElementById('photos-list');
    const empty = document.getElementById('empty-state');
    const label = document.getElementById('count-label');

    list.innerHTML = '';
    label.textContent = photos.length === 0
      ? '0 memories'
      : `${photos.length} ${photos.length === 1 ? 'memory' : 'memories'}`;

    if (photos.length === 0) {
      empty.style.display = '';
    } else {
      empty.style.display = 'none';
      photos.forEach(photo => list.appendChild(buildCard(photo)));

      // Intersection observer for scroll reveal
      const obs = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
      }, { threshold: 0.08 });
      document.querySelectorAll('.photo-entry').forEach(el => obs.observe(el));
    }
  }

  function buildCard(photo) {
    const entry = document.createElement('div');
    entry.className = 'photo-entry';
    entry.innerHTML = `
      <div class="photo-frame">
        <img src="${photo.src}" alt="${photo.title}" loading="lazy">
        <button class="photo-delete" onclick="deletePhoto(${photo.id})" title="Remove">✕</button>
        <div class="photo-caption">
          <h4>${photo.title}</h4>
          ${photo.date ? `<p class="caption-meta">${formatDate(photo.date)}</p>` : ''}
          ${photo.note ? `<p class="caption-note">${photo.note}</p>` : ''}
        </div>
      </div>
    `;
    return entry;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  // ── Toast ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ── Init ──
  loadPhotos();
</script>

</body>
</html>
